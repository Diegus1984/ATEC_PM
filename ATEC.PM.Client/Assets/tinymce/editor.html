<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
</style>
<script src="tinymce/tinymce.min.js"></script>
</head>
<body>
<textarea id="editor"></textarea>
<script>
var editorInstance = null;
var pendingUploads = {};  // id -> { resolve, reject }

function initEditor(initialContent) {
  tinymce.init({
    selector: '#editor',
    height: '100%',
    menubar: 'file edit view insert format table tools',
    branding: false,
    promotion: false,
    statusbar: true,
    resize: false,
    plugins: [
      'advlist autolink lists link image charmap print preview anchor',
      'searchreplace visualblocks code fullscreen',
      'insertdatetime media table paste code help wordcount',
      'imagetools hr nonbreaking pagebreak textcolor colorpicker'
    ],
    toolbar: [
      'undo redo | formatselect | bold italic underline strikethrough | forecolor backcolor',
      'alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | table image link | hr blockquote | code fullscreen'
    ],
    content_style: 'body { font-family: Segoe UI, sans-serif; font-size: 13px; margin: 10px; }',
    image_advtab: true,
    image_caption: true,
    paste_data_images: true,
    automatic_uploads: true,
    images_upload_handler: function(blobInfo) {
      return new Promise(function(resolve, reject) {
        var id = 'upload-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        pendingUploads[id] = { resolve: resolve, reject: reject };

        // Invia il file come base64 al C# per l'upload sul server
        if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage(JSON.stringify({
            type: 'imageUpload',
            uploadId: id,
            fileName: blobInfo.filename() || ('image-' + Date.now() + '.png'),
            base64: blobInfo.base64()
          }));
        } else {
          // Fallback: usa base64 inline
          resolve('data:' + blobInfo.blob().type + ';base64,' + blobInfo.base64());
          delete pendingUploads[id];
        }
      });
    },
    file_picker_types: 'image',
    file_picker_callback: function(callback, value, meta) {
      if (meta.filetype === 'image') {
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function() {
          var file = this.files[0];
          var reader = new FileReader();
          reader.onload = function() {
            var id = 'img-' + Date.now();
            var blobCache = tinymce.activeEditor.editorUpload.blobCache;
            var base64 = reader.result.split(',')[1];
            var blobInfo = blobCache.create(id, file, base64);
            blobCache.add(blobInfo);
            callback(blobInfo.blobUri(), { title: file.name, alt: file.name });
          };
          reader.readAsDataURL(file);
        };
        input.click();
      }
    },
    object_resizing: true,
    resize_img_proportional: true,
    table_default_attributes: { border: '1' },
    table_default_styles: { 'border-collapse': 'collapse', width: '100%' },
    table_responsive_width: true,
    setup: function(editor) {
      editor.on('init', function() {
        editorInstance = editor;
        if (initialContent) editor.setContent(initialContent);
      });
      editor.on('change keyup NodeChange', function() {
        if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage(JSON.stringify({
            type: 'contentChanged',
            html: editor.getContent()
          }));
        }
      });
    }
  });
}

// Chiamato dal C# dopo l'upload
function onImageUploaded(uploadId, url) {
  if (pendingUploads[uploadId]) {
    pendingUploads[uploadId].resolve(url);
    delete pendingUploads[uploadId];
  }
}

function onImageUploadFailed(uploadId, error) {
  if (pendingUploads[uploadId]) {
    pendingUploads[uploadId].reject(error);
    delete pendingUploads[uploadId];
  }
}

function getContent() {
  return editorInstance ? editorInstance.getContent() : '';
}

function setContent(html) {
  if (editorInstance) editorInstance.setContent(html || '');
}

window.addEventListener('load', function() { initEditor(''); });
</script>
</body>
</html>
